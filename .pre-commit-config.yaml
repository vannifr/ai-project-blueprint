repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: ^docs/llms-full.*\.txt$
      - id: check-merge-conflict
      - id: detect-private-key
      - id: debug-statements
        files: ^mcp_server/
      - id: check-ast
        files: ^mcp_server/.*\.py$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^mcp_server/
      - id: ruff-format
        files: ^mcp_server/

  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-frontmatter
          - mdformat-tables
          - mdformat-toc
          - mdformat-mkdocs

  - repo: local
    hooks:
      - id: validate-docs
        name: Validate documentation quality
        entry: python3 scripts/validate_docs.py
        language: system
        pass_filenames: false
        always_run: true

      - id: validate-frontmatter
        name: Validate frontmatter consistency
        entry: python3 scripts/validate_frontmatter.py
        language: system
        pass_filenames: false
        always_run: true

      - id: mcp-tests
        name: MCP server tests
        entry: bash -c 'cd mcp_server && source .venv/bin/activate && python -m pytest tests/ -q --tb=short'
        language: system
        pass_filenames: false
        files: ^mcp_server/
        types: [python]
