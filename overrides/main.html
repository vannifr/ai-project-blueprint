{% extends "base.html" %}

{% block extrahead %}
{# Zoekmachine-indexering: stel noindex: true/false in via extra.noindex in mkdocs.yml #}
{% if config.extra.get('noindex', false) %}<meta name="robots" content="noindex" />{% endif %}
{# Open Graph tags voor sharing via Slack/Teams/LinkedIn #}
<meta property="og:title" content="{% if page and page.title %}{{ page.title }} — {% endif %}{{ config.site_name }}" />
<meta property="og:description" content="{{ config.site_description }}" />
<meta property="og:type" content="article" />
{% endblock %}
