name: Build, Verify & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-ftp
  cancel-in-progress: true

jobs:
  quality:
    name: Verify Quality & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip' # Caches dependencies for faster subsequent runs

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pre-commit

      - name: Run Pre-commit hooks
        run: pre-commit run --all-files

      - name: Validate Documentation Quality
        run: python3 scripts/validate_docs.py

      - name: Build MkDocs (Strict)
        run: HTMLPROOFER_ENABLED=true mkdocs build --strict

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: site/
          retention-days: 1

  deploy:
    name: Deploy to FTP
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: ./site/

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/ai-project-playbook/
          local-dir: ./site/
          protocol: ftp
