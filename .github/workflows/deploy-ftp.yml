name: Build, Verify & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_pdf:
        description: 'PDF bouwen en deployen'
        type: boolean
        default: false

concurrency:
  group: deploy-ftp
  cancel-in-progress: true

jobs:
  quality:
    name: Verify Quality & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pre-commit

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run Pre-commit hooks
        run: SKIP=no-commit-to-branch pre-commit run --all-files

      - name: Validate Documentation Quality
        run: python3 scripts/validate_docs.py

      - name: Build MkDocs (Strict, NL only)
        run: MKDOCS_LANG=nl MKDOCS_BUILD_I18N=false HTMLPROOFER_ENABLED=true mkdocs build --strict

  build-site:
    name: Build Site (NL)
    runs-on: ubuntu-latest
    needs: quality
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs (NL)
        env:
          MKDOCS_BUILD_I18N: "false"
        run: mkdocs build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: site/
          retention-days: 7

  pdf:
    name: Build PDF (nl)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' && inputs.build_pdf == true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Build PDF (nl)
        env:
          MKDOCS_LANG: nl
          MKDOCS_EXPORTER_PDF: "true"
          MKDOCS_PDF_OUTPUT: "pdf/ai-project-blauwdruk.pdf"
          MKDOCS_BUILD_I18N: "false"
        run: mkdocs build --no-directory-urls

      - name: PDF Post-process (nl)
        env:
          MKDOCS_LANG: nl
          MKDOCS_PDF_OUTPUT: "pdf/ai-project-blauwdruk.pdf"
        run: python3 scripts/pdf_postprocess.py site

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-nl
          path: site/pdf/ai-project-blauwdruk.pdf
          retention-days: 30

  deploy:
    name: Deploy to FTP
    needs: [build-site, pdf]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      needs.build-site.result == 'success' &&
      (needs.pdf.result == 'success' || needs.pdf.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: ./site/

      - name: Download PDF (nl)
        if: needs.pdf.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: pdf-nl
          path: ./site/pdf/

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/ai-project-blueprint/
          local-dir: ./site/
          protocol: ftps
