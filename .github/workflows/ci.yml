name: Verify & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_pdf:
        description: 'PDF bouwen'
        type: boolean
        default: false

concurrency:
  group: ci
  cancel-in-progress: true

jobs:
  quality:
    name: Verify Quality & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pre-commit

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run Pre-commit hooks
        run: SKIP=no-commit-to-branch pre-commit run --all-files

      - name: Validate Documentation Quality
        run: python3 scripts/validate_docs.py

      - name: Build MkDocs (Strict, NL only)
        run: MKDOCS_LANG=nl MKDOCS_BUILD_I18N=false HTMLPROOFER_ENABLED=true mkdocs build --strict

  pdf:
    name: Build PDF (nl)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' && inputs.build_pdf == true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Build PDF (nl)
        env:
          MKDOCS_LANG: nl
          MKDOCS_EXPORTER_PDF: "true"
          MKDOCS_PDF_OUTPUT: "pdf/ai-project-blauwdruk.pdf"
          MKDOCS_BUILD_I18N: "false"
        run: mkdocs build --no-directory-urls

      - name: PDF Post-process (nl)
        env:
          MKDOCS_LANG: nl
          MKDOCS_PDF_OUTPUT: "pdf/ai-project-blauwdruk.pdf"
        run: python3 scripts/pdf_postprocess.py site

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-nl
          path: site/pdf/ai-project-blauwdruk.pdf
          retention-days: 30
