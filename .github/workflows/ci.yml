name: Verify & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_pdf:
        description: 'Build and deploy PDF (English)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.event_name == 'workflow_dispatch' && inputs.build_pdf == true && 'pdf' || 'main' }}
  cancel-in-progress: true

jobs:
  quality:
    name: Verify Quality & Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Patch mkdocs-static-i18n (fix infinite loop bug)
        run: python3 scripts/patch_i18n.py

      - name: Auto-fix trailing whitespace & markdown (mdformat)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          find docs/ -name "*.md" -exec sed -i 's/[[:space:]]*$//' {} +
          mdformat docs/
          if ! git diff --quiet; then
            git add docs/
            git commit -m "style: auto-fix whitespace & format markdown [skip ci]"
            git push
          fi

      - name: Run Pre-commit hooks
        run: SKIP=no-commit-to-branch,mdformat,trailing-whitespace,mcp-tests pre-commit run --all-files

      - name: Validate Documentation Quality
        run: python3 scripts/validate_docs.py

      - name: Generate llms-full.txt exports
        run: python3 scripts/export_playbook.py

      - name: Commit updated LLM exports if changed
        run: |
          if ! git diff --quiet docs/llms-full.txt docs/llms-full-nl.txt; then
            git add docs/llms-full.txt docs/llms-full-nl.txt
            git commit -m "chore: regenerate llms-full exports [skip ci]"
            git push || echo "Push failed (concurrent run), skipping — exports are in the build artifact"
          fi

      - name: Build MkDocs (Strict, NL + EN)
        run: MKDOCS_LANG=nl MKDOCS_BUILD_I18N=true HTMLPROOFER_ENABLED=false mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-html
          path: site/
          retention-days: 1

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: quality
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_pdf != true)
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy via SSH (git pull + update)
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.SSH_PATH }} && git pull && bash deploy/update.sh"

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: quality
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_pdf != true)
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-html
          path: site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  pdf:
    name: Build & Deploy PDF (EN)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' && inputs.build_pdf == true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Patch mkdocs-static-i18n (fix infinite loop bug)
        run: python3 scripts/patch_i18n.py

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Pre-process docs for EN build
        run: |
          find docs/ -name "*.en.md" | while read en_file; do
            nl_file="${en_file%.en.md}.md"
            cp "$en_file" "$nl_file"
          done

      - name: Build PDF (EN)
        env:
          MKDOCS_LANG: en
          MKDOCS_EXPORTER_PDF: "true"
          MKDOCS_PDF_OUTPUT: "pdf/ai-project-blueprint.pdf"
          MKDOCS_PDF_AGGREGATE: "true"
          MKDOCS_BUILD_I18N: "false"
        run: mkdocs build --no-directory-urls

      - name: PDF Post-process
        env:
          MKDOCS_LANG: en
          MKDOCS_PDF_OUTPUT: "pdf/ai-project-blueprint.pdf"
        run: python3 scripts/pdf_postprocess.py site

      - name: Download HTML site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-html
          path: site/

      - name: Add PDF to site
        run: |
          mkdir -p site/pdf
          cp site/pdf/ai-project-blueprint.pdf /tmp/ai-project-blueprint.pdf 2>/dev/null || true
          cp /tmp/ai-project-blueprint.pdf site/pdf/ai-project-blueprint.pdf

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy via rsync (with PDF)
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }}" \
            site/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PATH }}/

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-en
          path: site/pdf/ai-project-blueprint.pdf
          retention-days: 30
