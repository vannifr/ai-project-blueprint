name: Verify & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_pdf:
        description: 'PDF bouwen en deployen'
        type: boolean
        default: false

concurrency:
  group: ci
  cancel-in-progress: true

jobs:
  quality:
    name: Verify Quality & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pre-commit

      - name: Run Pre-commit hooks
        run: SKIP=no-commit-to-branch,mdformat pre-commit run --all-files

      - name: Auto-format markdown (mdformat)
        run: |
          mdformat docs/
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/
            git commit -m "style: auto-format markdown [skip ci]"
            git push
          fi

      - name: Validate Documentation Quality
        run: python3 scripts/validate_docs.py

      - name: Build MkDocs (Strict, NL only)
        run: MKDOCS_LANG=nl MKDOCS_BUILD_I18N=false HTMLPROOFER_ENABLED=true mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-html
          path: site/
          retention-days: 1

  deploy:
    name: Deploy naar Netlify (HTML)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-html
          path: site/

      - name: Deploy naar Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './site'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROJECT_ID }}

  pdf:
    name: Build & Deploy PDF (nl)
    runs-on: ubuntu-latest
    needs: quality
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_pdf == true)
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Build PDF (nl)
        env:
          MKDOCS_LANG: nl
          MKDOCS_EXPORTER_PDF: "true"
          MKDOCS_PDF_OUTPUT: "pdf/ai-project-blauwdruk.pdf"
          MKDOCS_BUILD_I18N: "false"
        run: mkdocs build --no-directory-urls

      - name: PDF Post-process (nl)
        env:
          MKDOCS_LANG: nl
          MKDOCS_PDF_OUTPUT: "pdf/ai-project-blauwdruk.pdf"
        run: python3 scripts/pdf_postprocess.py site

      - name: Bewaar verwerkte PDF
        run: cp site/pdf/ai-project-blauwdruk.pdf /tmp/ai-project-blauwdruk.pdf

      - name: Download HTML site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-html
          path: site/

      - name: Voeg PDF toe aan site
        run: mkdir -p site/pdf && cp /tmp/ai-project-blauwdruk.pdf site/pdf/ai-project-blauwdruk.pdf

      - name: Deploy naar Netlify (met PDF)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './site'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROJECT_ID }}

      - name: Upload PDF als artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-nl
          path: site/pdf/ai-project-blauwdruk.pdf
          retention-days: 30
