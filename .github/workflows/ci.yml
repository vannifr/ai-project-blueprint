name: Verify & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_pdf:
        description: 'Build and deploy PDF'
        type: boolean
        default: false
      pdf_language:
        description: 'Language for PDF (nl = blauwdruk, en = blueprint)'
        type: choice
        options: [nl, en]
        default: nl

concurrency:
  group: ci-${{ github.event_name == 'workflow_dispatch' && inputs.build_pdf == true && format('pdf-{0}', inputs.pdf_language) || 'main' }}
  cancel-in-progress: true

jobs:
  quality:
    name: Verify Quality & Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Patch mkdocs-static-i18n (fix infinite loop bug)
        run: python3 scripts/patch_i18n.py

      - name: Auto-fix trailing whitespace & markdown (mdformat)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          find docs/ -name "*.md" -exec sed -i 's/[[:space:]]*$//' {} +
          mdformat docs/
          if ! git diff --quiet; then
            git add docs/
            git commit -m "style: auto-fix whitespace & format markdown [skip ci]"
            git push
          fi

      - name: Run Pre-commit hooks
        run: SKIP=no-commit-to-branch,mdformat,trailing-whitespace pre-commit run --all-files

      - name: Re-checkout (shallow, for fast git-revision-date)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate Documentation Quality
        run: python3 scripts/validate_docs.py

      - name: Build MkDocs (Strict, NL + EN)
        run: MKDOCS_LANG=nl MKDOCS_BUILD_I18N=true HTMLPROOFER_ENABLED=false mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-html
          path: site/
          retention-days: 1

  deploy:
    name: Deploy via rsync (HTML)
    runs-on: ubuntu-latest
    needs: quality
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_pdf != true)
    timeout-minutes: 5
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-html
          path: site/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} -o HostKeyAlgorithms=ssh-rsa -o PubkeyAcceptedAlgorithms=ssh-rsa" \
            site/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PATH }}/

  pdf:
    name: Build & Deploy PDF (${{ inputs.pdf_language }})
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' && inputs.build_pdf == true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Patch mkdocs-static-i18n (fix infinite loop bug)
        run: python3 scripts/patch_i18n.py

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Pre-process docs for EN build
        if: inputs.pdf_language == 'en'
        run: |
          find docs/ -name "*.en.md" | while read en_file; do
            nl_file="${en_file%.en.md}.md"
            cp "$en_file" "$nl_file"
          done

      - name: Build PDF (${{ inputs.pdf_language }})
        env:
          MKDOCS_LANG: ${{ inputs.pdf_language }}
          MKDOCS_EXPORTER_PDF: "true"
          MKDOCS_PDF_OUTPUT: ${{ inputs.pdf_language == 'en' && 'pdf/ai-project-blueprint.pdf' || 'pdf/ai-project-blauwdruk.pdf' }}
          MKDOCS_BUILD_I18N: "false"
        run: mkdocs build --no-directory-urls

      - name: PDF Post-process (${{ inputs.pdf_language }})
        env:
          MKDOCS_LANG: ${{ inputs.pdf_language }}
          MKDOCS_PDF_OUTPUT: ${{ inputs.pdf_language == 'en' && 'pdf/ai-project-blueprint.pdf' || 'pdf/ai-project-blauwdruk.pdf' }}
        run: python3 scripts/pdf_postprocess.py site

      - name: Save processed PDF
        run: |
          if [ "${{ inputs.pdf_language }}" = "en" ]; then
            cp site/pdf/ai-project-blueprint.pdf /tmp/ai-project-pdf.pdf
          else
            cp site/pdf/ai-project-blauwdruk.pdf /tmp/ai-project-pdf.pdf
          fi

      - name: Download HTML site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-html
          path: site/

      - name: Add PDF to site
        run: |
          mkdir -p site/pdf
          if [ "${{ inputs.pdf_language }}" = "en" ]; then
            cp /tmp/ai-project-pdf.pdf site/pdf/ai-project-blueprint.pdf
          else
            cp /tmp/ai-project-pdf.pdf site/pdf/ai-project-blauwdruk.pdf
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy via rsync (with PDF)
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} -o HostKeyAlgorithms=ssh-rsa -o PubkeyAcceptedAlgorithms=ssh-rsa" \
            site/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PATH }}/

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-${{ inputs.pdf_language }}
          path: ${{ inputs.pdf_language == 'en' && 'site/pdf/ai-project-blueprint.pdf' || 'site/pdf/ai-project-blauwdruk.pdf' }}
          retention-days: 30
