<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- AI Project Gids favicon: teal rounded-rect background for browser tabs -->
  <rect width="32" height="32" rx="6" fill="#009688"/>
  <!-- Connecting lines -->
  <line x1="16" y1="4"  x2="5"  y2="26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="4"  x2="27" y2="26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="5"  y1="26" x2="27" y2="26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="9"  y1="17" x2="23" y2="17" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.8"/>
  <!-- Outer nodes -->
  <circle cx="16" cy="4"  r="3"   fill="white"/>
  <circle cx="5"  cy="26" r="3"   fill="white"/>
  <circle cx="27" cy="26" r="3"   fill="white"/>
  <!-- Crossbar nodes -->
  <circle cx="9"  cy="17" r="1.8" fill="white" fill-opacity="0.8"/>
  <circle cx="23" cy="17" r="1.8" fill="white" fill-opacity="0.8"/>
</svg>
