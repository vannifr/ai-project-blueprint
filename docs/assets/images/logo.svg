<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- AI Project Blauwdruk logo: triangle network (white on transparent, for teal header) -->
  <!-- Connecting lines -->
  <line x1="16" y1="3"  x2="4"  y2="27" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="3"  x2="28" y2="27" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4"  y1="27" x2="28" y2="27" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Crossbar (midpoint connections give the "AI" feel) -->
  <line x1="9"  y1="18" x2="23" y2="18" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.75"/>
  <!-- Outer nodes -->
  <circle cx="16" cy="3"  r="3.2" fill="white"/>
  <circle cx="4"  cy="27" r="3.2" fill="white"/>
  <circle cx="28" cy="27" r="3.2" fill="white"/>
  <!-- Crossbar nodes -->
  <circle cx="9"  cy="18" r="2"   fill="white" fill-opacity="0.75"/>
  <circle cx="23" cy="18" r="2"   fill="white" fill-opacity="0.75"/>
</svg>
