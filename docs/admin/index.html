<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>CMS — AI Project Blauwdruk</title>

      (async () => {
        const r = await fetch('/ai-project-blueprint/admin/config.yml');

        CMS.init({ config });
      })();
    </script>
