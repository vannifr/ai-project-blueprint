# Decap CMS — AI Project Blauwdruk
# Documentatie: https://decapcms.org/docs/
#
# PRODUCTIE — GitHub OAuth:
#   Stel 'base_url' in op uw OAuth-proxy (zie docs/admin/SETUP.md).
#   Aanbevolen gratis optie: Netlify OAuth provider of Cloudflare Worker.
#
# LOKAAL ONTWIKKELEN:
#   1. npx decap-server              (in project root)
#   2. mkdocs serve                  (in ander terminal)
#   3. Ga naar http://localhost:8000/admin/

backend:
  name: github
  repo: vannifr/ai-project-blueprint
  branch: main
  # Verwijder onderstaande regel na configuratie van uw OAuth-proxy:
  base_url: https://api.netlify.com

# Inschakelen voor lokale ontwikkeling (werkt met npx @staticcms/proxy-server)
local_backend: true

media_folder: docs/assets/images
public_folder: /assets/images

# Toon publicatieknop (commit direct naar main zonder pull request)
publish_mode: simple

collections:

  # ─── STARTPAGINA & RELEASE NOTES ──────────────────────────────────────────

  - name: site-paginas
    label: "Startpagina & Release Notes"
    files:
      - name: startpagina
        label: "🏠 Startpagina"
        file: docs/index.md
        fields:
          - { label: "Versie", name: versie, widget: string, default: "1.0" }
          - { label: "Inhoud", name: body, widget: markdown }
      - name: release-notes
        label: "🗒️ Release Notes"
        file: docs/release-notes.md
        fields:
          - { label: "Versie", name: versie, widget: string, default: "1.0" }
          - { label: "Inhoud", name: body, widget: markdown }

  # ─── STRATEGISCH KADER ────────────────────────────────────────────────────

