site_name: AI Project Gids
site_description: Modulaire documentatie voor AI-projectmanagement (PMI-CPMAI & Agile-AI).
site_author: AI Project Playbook Team
copyright: '&copy; 2026 AI Project Gids. Gelicenseerd onder CC BY-NC-SA 4.0.'

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks/add_noindex.py
  - hooks/render_covers.py
  - hooks/pdf_heading_numbers.py

theme:
  name: material
  language: nl
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
  custom_dir: overrides
  palette:
    - scheme: default
      primary: teal
      accent: purple
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: false
  - toc:
      permalink: true

plugins:
  - search
  - git-revision-date-localized:
      locale: nl
      type: date
  - exporter:
      formats:
        pdf:
          enabled: !ENV [MKDOCS_EXPORTER_PDF, false]
          concurrency: 8
          stylesheets:
            - resources/stylesheets/pdf.scss
          covers:
            front: resources/templates/covers/front.html.j2
            back: resources/templates/covers/back.html.j2
          aggregator:
            enabled: true
            output: pdf/ai-project-gids.pdf
            covers: limits
  - htmlproofer:
      enabled: !ENV [HTMLPROOFER_ENABLED, False]
      raise_error: true
      raise_error_after_finish: true
      ignore_urls:
        - "^http://localhost"

