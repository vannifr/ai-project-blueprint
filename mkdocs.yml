site_name: AI Project Blueprint
site_url: https://ai-delivery.io/
site_description: Modular framework for AI project management — covering strategy, governance, compliance, and delivery (PMI-CPMAI & Agile-AI).
site_author: AI Project Playbook Team
copyright: '&copy; 2026 AI Project Blueprint. Licensed under CC BY-NC-SA 4.0.'
extra:
  noindex: false
  url_nl: "https://ai-delivery.io/"
  url_en: "https://ai-delivery.io/en/"
  og_image: "https://ai-delivery.io/assets/images/social-card.svg"

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks/render_covers.py
  - hooks/pdf_heading_numbers.py

theme:
  name: material
  font: false
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.prune
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
  custom_dir: overrides
  palette:
    - scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to light mode

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: nl
          default: true
          name: Nederlands
          build: true
          site_name: AI Project Blauwdruk
          site_description: Modulaire documentatie voor AI-projectmanagement (PMI-CPMAI & Agile-AI).
          copyright: '&copy; 2026 AI Project Blauwdruk. Gelicenseerd onder CC BY-NC-SA 4.0.'
        - locale: en
          name: English
          build: !ENV [MKDOCS_BUILD_I18N, true]
          site_name: AI Project Blueprint
          copyright: '&copy; 2026 AI Project Blueprint. Licensed under CC BY-NC-SA 4.0.'
          nav_translations:
