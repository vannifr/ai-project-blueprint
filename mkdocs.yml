site_name: AI Project Playbook
site_description: Modulaire documentatie voor AI-projectmanagement (PMI-CPMAI & Agile-AI).
site_author: AI Project Playbook Team
copyright: '&copy; 2026 AI Project Playbook. Gelicenseerd onder CC BY-NC-SA 4.0.'

# Blokkeer zoekmachines
extra_css:
  - stylesheets/extra.css

# Voeg noindex toe aan de head van elke pagina
hooks:
  - hooks/add_noindex.py

theme:
  name: material
  language: nl
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight
  custom_dir: overrides
  palette:
    - scheme: default
      primary: teal
      accent: purple
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

plugins:
  - search
  - htmlproofer:
      enabled: !ENV [HTMLPROOFER_ENABLED, False]
      raise_error: true
      raise_error_after_finish: true
      ignore_urls:
        - "^http://localhost"

