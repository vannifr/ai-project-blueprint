  - search:
      lang: [nl, en]
  - git-revision-date-localized:
      locale: !ENV [MKDOCS_LANG, "nl"]
      type: date
      enable_parallel_processing: false
      fallback_to_build_date: true
  - exporter:
      formats:
        pdf:
          enabled: !ENV [MKDOCS_EXPORTER_PDF, false]
          explicit: false
          concurrency: 4
          stylesheets:
            - resources/stylesheets/pdf.scss
          covers:
            front: resources/templates/covers/front.html.j2
            back: resources/templates/covers/back.html.j2
          aggregator:
            enabled: true
            output: !ENV [MKDOCS_PDF_OUTPUT, "pdf/ai-project-blauwdruk.pdf"]
            covers: limits
  - htmlproofer:
      enabled: !ENV [HTMLPROOFER_ENABLED, False]
      raise_error: true
      raise_error_after_finish: true
      ignore_urls:
        - "^http://localhost"
        - ".*\\.pdf$"
        - "^/en/.*"
      ignore_pages: []

