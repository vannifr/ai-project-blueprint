services:
  chatbot:
    build:
      context: ../chatbot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - CHAT_API_HOST=0.0.0.0
      - CHAT_API_PORT=8901
      - CHAT_CHROMA_PATH=/app/chroma_data
      - CHAT_DOCS_ROOT=/app/docs
      - CHAT_ALLOWED_ORIGINS=["https://ai-delivery.io"]
    volumes:
      - chroma_data:/app/chroma_data
      - ../docs:/app/docs:ro
    ports:
      - "127.0.0.1:8901:8901"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8901/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-server:
    build:
      context: ../mcp_server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - BLUEPRINT_TRANSPORT=streamable-http
      - BLUEPRINT_HOST=0.0.0.0
      - BLUEPRINT_PORT=8902
      - BLUEPRINT_DOCS_PATH=/app/docs
      - BLUEPRINT_LANGUAGE=en
    volumes:
      - ../docs:/app/docs:ro
    ports:
      - "127.0.0.1:8902:8902"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8902/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  chroma_data:
