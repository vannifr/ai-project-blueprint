server {
    listen 80;
    listen [::]:80;
    server_name ai-delivery.io www.ai-delivery.io;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://ai-delivery.io$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai-delivery.io;

    ssl_certificate /etc/letsencrypt/live/ai-delivery.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-delivery.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static site
    root /var/www/ai-delivery.io;
    index index.html;

    # Cache static assets
    location ~* \.(css|js|svg|png|woff2|ico)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # RAG Chatbot API
    location /api/ {
        proxy_pass http://127.0.0.1:8901;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP Server (streamable-http)
    location /mcp/ {
        proxy_pass http://127.0.0.1:8902;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Fallback for MkDocs pretty URLs
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}

# Redirect www to apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ai-delivery.io;

    ssl_certificate /etc/letsencrypt/live/ai-delivery.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-delivery.io/privkey.pem;

    return 301 https://ai-delivery.io$request_uri;
}
